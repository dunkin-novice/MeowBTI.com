<body>

    <header class="main-header" id="main-header"></header>

    <main>
        <section class="page-content">
            <div class="container">

    <script src="data/i18n.js"></script>
    <script src="data/archetypes.js"></script>
    <script src="script.js"></script>
    <script>
    // Render the 16 archetypes as 4 thematic groups, keyed by axes 2 (H/D)
    // and 4 (R/C). Each group's order matches the canonical xHxR / xDxR /
    // xHxC / xDxC slicing of the cube.
    (function () {
        if (!window.MeowArchetypes || !window.MeowI18n) return;
        const A = window.MeowArchetypes;
        const { t, withLang, getLang } = window.MeowI18n;

        const GROUPS = [
            { titleKey: 'browseGenerals',    match: c => c[1] === 'H' && c[3] === 'R' },
            { titleKey: 'browseVisionaries', match: c => c[1] === 'D' && c[3] === 'R' },
            { titleKey: 'browseMavericks',   match: c => c[1] === 'H' && c[3] === 'C' },
            { titleKey: 'browseExplorers',   match: c => c[1] === 'D' && c[3] === 'C' },
        ];

        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, ch => ({
                '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
            }[ch]));
        }

        function name(a) {
            return getLang() === 'th' && a.nameTh ? a.nameTh : a.name;
        }

        function card(a, i) {
            const tilt = i % 2 === 0 ? '0.6deg' : '-0.6deg';
            // CHNC's color is yellow → keep dark ink for legibility, like the original markup did.
            const colorOverride = a.code === 'CHNC' ? ';color:#1F1410' : '';
            return `
                <a class="browse-card" href="${withLang('human-types/' + a.code + '.html')}"
                   style="background:${a.color}${colorOverride};transform:rotate(${tilt})">
                    <img class="bc-image" src="${A.imagePath(a.code)}"
                         alt="${escapeHtml(name(a))} cat illustration"
                         loading="lazy" decoding="async">
                    <div class="bc-code">${a.code}</div>
                    <div class="bc-name">${escapeHtml(name(a))}</div>
                </a>`;
        }

        // Within each group, preserve the original B-before-N, then C-before-S
        // ordering so the grid reads the same visually.
        function rank(code) {
            return (code[2] === 'B' ? 0 : 2) + (code[0] === 'C' ? 0 : 1);
        }

        const host = document.getElementById('browse-groups');
        host.innerHTML = GROUPS.map(g => {
            const members = A.all.filter(a => g.match(a.code))
                                 .sort((a, b) => rank(a.code) - rank(b.code));
            return `
                <div class="type-group">
                    <h2 class="type-group-title">${escapeHtml(t(g.titleKey))}</h2>
                    <div class="browse-grid">
                        ${members.map(card).join('')}
                    </div>
                </div>`;
        }).join('');
    })();
    </script>
</body>
