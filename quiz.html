<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeowBTI Quiz — what kind of menace is your cat?</title>
    <meta name="description" content="The 8-question MeowBTI test. Tap whichever feels more like your cat. ~60 seconds.">
    <meta name="theme-color" content="#FFF4EC">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header" id="main-header"></header>

    <main>
        <section class="quiz-section">
            <div class="container">

                <div class="quiz-bar">
                    <a href="index.html" class="ghost-btn" aria-label="Back home">← back</a>
                    <div class="quiz-progress" id="quiz-progress" role="progressbar" aria-valuemin="1" aria-valuemax="8" aria-valuenow="1"></div>
                    <span class="quiz-count" id="quiz-count">1/8</span>
                </div>

                <div class="card-stack" id="card-stack">
                    <!-- card injected by quiz-script.js -->
                </div>

            </div>
        </section>
    </main>

    <footer class="main-footer" id="main-footer"></footer>

    <script src="script.js"></script>
    <script src="quiz-script.js"></script>
</body>
</html>
