<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Burnout Check Result | MeowBTI</title>
    <meta name="robots" content="noindex, follow">
    <meta name="theme-color" content="#FFF4EC">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <meta property="og:title" content="My Burnout Check Reflection | MeowBTI">
    <meta property="og:description" content="A gentle self-reflection result for noticing energy, pressure, and recovery patterns.">
    <meta property="og:image" content="https://meowbti.com/assets/personalities/sdnc-the-daydreamer.webp">
    <meta property="og:url" content="https://meowbti.com/burnout/result.html">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="../style.css">
    <script src="../analytics.js" defer></script>
    <script src="../data/i18n.js" defer></script>
    <script src="../script.js" defer></script>
</head>
<body>
    <header class="main-header" id="main-header"></header>
    <main>
        <section class="result-section attachment-result-section">
            <div class="container">
                <div id="burnout-result-content" class="attachment-result-content">
                    <p style="text-align:center; padding:80px 0; opacity:0.6;">Loading your reflection...</p>
                </div>
            </div>
        </section>
    </main>
    <footer class="main-footer" id="main-footer"></footer>
    <script>
    document.addEventListener("DOMContentLoaded", () => {
        const RESULTS = {
            thriving: {
                name: "Thriving",
                signs: ["Energy feels mostly available", "Recovery time is working", "Pressure feels manageable"],
                patterns: "Your current pattern suggests that effort and recovery are still in a workable rhythm.",
                recovery: "Protect what is already helping. Keep recovery visible before pressure starts to pile up.",
                suggestions: ["Keep one non-negotiable rest ritual", "Notice early warning signs before they become loud", "Avoid filling every open space just because you can"]
            },
            balanced: {
                name: "Balanced",
                signs: ["Some pressure is present", "Recovery helps, but may need protection", "Energy varies by context"],
                patterns: "Your current pattern looks mostly steady, with some signs that pressure could grow if recovery gets squeezed.",
                recovery: "Think of balance as maintenance, not perfection. Small boundaries now can prevent larger strain later.",
                suggestions: ["Choose one load to simplify this week", "Put recovery on the calendar before optional tasks", "Name what drains you versus what restores you"]
            },
            strained: {
                name: "Strained",
                signs: ["Fatigue may be lingering", "Motivation may feel harder to access", "Recovery may not fully reset you"],
                patterns: "Your current pattern suggests that pressure may be outpacing recovery. You may still be functioning, but it could be costing more than usual.",
                recovery: "Focus on reducing load where possible and making recovery more concrete. This is a good moment to ask what can be delayed, delegated, or simplified.",
                suggestions: ["Cut one recurring obligation if possible", "Ask for practical support before you are fully depleted", "Create a low-stimulation recovery block"]
            },
            risk: {
                name: "Burnout Risk",
                signs: ["Exhaustion may feel persistent", "Rest may not feel restorative", "Pressure may feel hard to escape"],
                patterns: "Your current pattern suggests a high strain state. This result is not a diagnosis, but it is a signal to take your recovery needs seriously.",
                recovery: "Prioritize immediate load reduction and support. If distress feels intense, unsafe, or unmanageable, consider reaching out to a qualified professional or trusted support person.",
                suggestions: ["Reduce nonessential commitments quickly", "Tell someone specific what support would help", "Protect sleep, food, movement, and quiet time as basics, not rewards"]
            }
        };

        function escapeHtml(value) {
            return String(value).replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" }[ch]));
        }

        const params = new URLSearchParams(window.location.search);
        const result = RESULTS[params.get("type")];
        const rawScore = Number(params.get("score") || 0);
        const score = Number.isFinite(rawScore) ? Math.max(20, Math.min(100, rawScore)) : 0;
        const pct = Math.round(((score - 20) / 80) * 100);
        const host = document.getElementById("burnout-result-content");

        if (!host || !result) {
            if (host) {
                host.innerHTML = `
                    <div class="attachment-result-card">
                        <h1>Result not found</h1>
                        <p>This result link is missing a valid reflection band. You can retake the Burnout Check anytime.</p>
                        <a class="big-btn accent" href="test.html" data-i18n-href>Retake the check</a>
                    </div>
                `;
            }
            return;
        }

        window.MeowTrack && window.MeowTrack("result_view", {
            framework: "burnout_check",
            result_type: params.get("type")
        });

        host.innerHTML = `
            <article class="attachment-result-card">
                <a class="mbti-breadcrumb" href="./" data-i18n-href>Burnout Check Guide</a>
                <span class="mbti-content-kicker">Self-reflection result</span>
                <h1>${escapeHtml(result.name)}</h1>
                <p class="attachment-result-overview">${escapeHtml(result.patterns)}</p>
                <p class="attachment-disclaimer">This is a self-reflection tool, not a diagnosis, medical advice, therapy, or a mental health screening.</p>

                <section>
                    <h2>Your strain score</h2>
                    <div class="attachment-score-list">
                        <div class="attachment-score-row">
                            <span>Current load</span>
                            <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
                            <strong>${escapeHtml(score)}</strong>
                        </div>
                    </div>
                </section>
                <section>
                    <h2>Signs</h2>
                    <ul>${result.signs.map(item => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
                </section>
                <section>
                    <h2>Patterns</h2>
                    <p>${escapeHtml(result.patterns)}</p>
                </section>
                <section>
                    <h2>Recovery reflections</h2>
                    <p>${escapeHtml(result.recovery)}</p>
                </section>
                <section>
                    <h2>Practical suggestions</h2>
                    <ul>${result.suggestions.map(item => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
                </section>
                <div class="attachment-result-actions">
                    <a class="big-btn accent" href="./" data-i18n-href>Read the guide</a>
                    <a class="big-btn ghost" href="../psychology/" data-i18n-href>Psychology Hub</a>
                    <a class="big-btn ghost" href="test.html" data-i18n-href>Retake the check</a>
                </div>
            </article>
        `;
    });
    </script>
</body>
</html>
